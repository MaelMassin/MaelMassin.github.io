<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin – Portfolio Maël</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #141414;
      color: #d9d9d9;
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1c1c1c;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-card h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ededed;
      margin-bottom: 8px;
    }
    .login-card p {
      font-size: 0.9rem;
      color: rgba(217,217,217,0.5);
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(217,217,217,0.6);
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"] {
      display: block;
      width: 100%;
      padding: 12px 16px;
      background: #0e0e0e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #ededed;
      font-size: 1rem;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #ff4d4f; }
    .btn-submit {
      display: block;
      width: 100%;
      padding: 13px;
      background: #ff4d4f;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-submit:hover { background: #e03c3e; transform: translateY(-1px); }
    .error {
      background: rgba(255,77,79,0.12);
      border: 1px solid rgba(255,77,79,0.4);
      border-radius: 8px;
      padding: 10px 14px;
      color: #ff4d4f;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 0.88rem;
      color: rgba(217,217,217,0.45);
      text-decoration: none;
    }
    .back-link:hover { color: #ff4d4f; }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>Connexion Admin</h2>
    <p>Espace protégé – portfolio de Maël Massin</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <label for="username">Identifiant</label>
      <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required>

      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>

      <button type="submit" class="btn-submit">Se connecter</button>
    </form>

    <a href="{{ url_for('index') }}" class="back-link">← Retour au portfolio</a>
  </div>
</body>
</html>
